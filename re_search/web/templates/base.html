{# 共通レイアウト #}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}re-search{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    .score-bar { transition: width 0.6s ease; }
    .verdict-good { color: #16a34a; }
    .verdict-bad  { color: #dc2626; }
    .verdict-neutral { color: #6b7280; }
    .leaflet-popup-content { font-size: 0.875rem; line-height: 1.4; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
  <header class="bg-stone-900 text-stone-50 shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <span class="text-2xl">🏘️</span>
        <span class="font-bold tracking-wide">re-search</span>
        <span class="text-stone-400 text-sm">不動産探索 / 沿革・建替・風水込み</span>
      </a>
      <nav class="text-sm text-stone-300">
        <a href="/" class="hover:text-white">物件一覧</a>
      </nav>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-stone-400 py-6">
    re-search · personal CLI · sqlite read-only
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
